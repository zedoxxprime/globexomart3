import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js';import{getAuth,createUserWithEmailAndPassword,signInWithEmailAndPassword,onAuthStateChanged,signOut}from'https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js';import{getFirestore,doc,setDoc,addDoc,collection,onSnapshot,query,where,serverTimestamp,updateDoc}from'https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js';
const firebaseConfig={apiKey:"AIzaSyC7SjMgzuH7stBaTP-jqkHfXDLmnNJV0X8",authDomain:"globexo-d9ade.firebaseapp.com",databaseURL:"https://globexo-d9ade-default-rtdb.firebaseio.com",projectId:"globexo-d9ade",storageBucket:"globexo-d9ade.firebasestorage.app",messagingSenderId:"1009453417317",appId:"1:1009453417317:web:32538a719df79d3c6ed78c",measurementId:"G-X0QPY3ML6M"};
const app=initializeApp(firebaseConfig),auth=getAuth(app),db=getFirestore(app);let me=null,profile={},plans=[],methods=[],orders=[],earnings=[],withdrawals=[],coupons=[],community=[],settings={paymentId:'Set by admin',referralPercent:20,vipChannelLink:''};const rank={Free:0,Basic:0,Standard:1,Plus:2,Pro:3};
const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)];function toast(x){$('#toast').textContent=x;$('#toast').classList.add('show');setTimeout(()=>$('#toast').classList.remove('show'),2600)}function money(n){return '$'+Number(n||0).toFixed(2)}function code(){return profile.referralCode||('REF'+(me?.uid||'').slice(0,8).toUpperCase())}function refUrl(){return location.origin+location.pathname+'?ref='+code()}function daysAgo(d){return Date.now()-d*864e5}function sumSince(ms){return earnings.filter(e=>(e.createdAt?.toMillis?.()||0)>=ms).reduce((a,b)=>a+Number(b.amount||0),0)}
function show(id){$$('.page').forEach(p=>p.classList.remove('active'));$('#'+id)?.classList.add('active');$$('.nav button').forEach(b=>b.classList.toggle('on',b.dataset.page==id));if(id==='methods')setTimeout(()=>filterMethods('All'),20)}
function redraw(){if(!me){$('#app').innerHTML=landing();return}let a=sumSince(daysAgo(30)),b=sumSince(daysAgo(365)),c=earnings.reduce((x,y)=>x+Number(y.amount||0),0),paid=rank[profile.plan||'Basic']>0;$('#app').innerHTML=`<header class="mobilebar"><button id="menuBtn">☰</button><div class="brand"><img class="logoIcon" src="globexomart-learn-earn-icon.svg" alt="GlobexoMart"><b>GlobexoMart</b></div></header><aside class="side" id="side"><div class="brand"><img class="logoIcon" src="globexomart-learn-earn-icon.svg" alt="GlobexoMart"><b>GlobexoMart</b></div><nav class="nav"><button class="on" data-page="dash">Dashboard</button><button data-page="plans">Plans</button><button data-page="methods">Methods</button><button data-page="ref">Referral</button><button data-page="withdraw">Withdraw</button><button data-page="community">Community</button><button data-page="support">Support</button></nav><button class="danger" id="logoutBtn">Logout</button></aside><main class="main"><section id="dash" class="page active">${dash(a,b,c)}</section><section id="plans" class="page">${plansHtml()}</section><section id="methods" class="page">${methodsHtml()}</section><section id="ref" class="page">${refHtml(a,b,c)}</section><section id="withdraw" class="page">${withdrawHtml(c)}</section><section id="community" class="page">${communityHtml(paid)}</section><section id="support" class="page"><h1>Support</h1><div class="card">Need help with plan approval, method access, or payment? Contact admin through the official community buttons.</div></section></main>`;$$('.nav button').forEach(b=>b.onclick=()=>{show(b.dataset.page);$('#side')?.classList.remove('open')});$('#logoutBtn').onclick=()=>signOut(auth);$('#menuBtn').onclick=()=>$('#side').classList.toggle('open');drawChart(a,b,c);setTimeout(()=>filterMethods('All'),40)}
function landing(){let all=methods.slice(0,6);return`<header class="top"><div class="brand"><img class="logoIcon" src="globexomart-learn-earn-icon.svg" alt="GlobexoMart"><b>GlobexoMart</b></div></header><section class="hero"><span>Premium Methods • Real Earnings</span><h1>Unlock Premium Methods<br><em>& Grow Your Earnings</em></h1><p>Access high quality earning methods, step-by-step guides, referral rewards, and private plan community access.</p><button class="primary" onclick="openAuth('signup')">Create Account</button><button onclick="openAuth('login')">Login to Account</button></section><section class="stats"><div><b>${settings.totalMembers||'500+'}</b><p>Growing members</p></div><div><b>${settings.totalMethods||'100+'}</b><p>Methods & guides</p></div><div><b>${settings.referralPercent||20}%</b><p>Referral reward</p></div><div><b>VIP</b><p>Private plan access</p></div></section><section class="public"><h2>Latest Methods</h2><p class="muted">View method names and previews. Free methods open directly. Standard, Plus and Pro methods need an active plan.</p><div class="grid">${all.map(methodCard).join('')||'<div class="card">Methods will appear here after admin uploads them.</div>'}</div></section>`}
function dash(a,b,c){return`<h1>Dashboard</h1><p class="muted">Welcome ${profile.name||''}. Track plan access, referral income, orders, and withdrawals.</p><div class="grid"><div class="card big"><small>Current Plan</small><h2>${profile.plan||'Basic'}</h2><p>${profile.planExpiry?'Expires: '+new Date(profile.planExpiry).toLocaleDateString():'Free access'}</p></div><div class="card"><small>Last 30 Days</small><h2>${money(a)}</h2></div><div class="card"><small>1 Year Earnings</small><h2>${money(b)}</h2></div><div class="card"><small>Total Earnings</small><h2>${money(c)}</h2></div></div><div class="card"><canvas id="chart" height="120"></canvas></div><h2>Pending Orders</h2>${orders.length?orders.map(o=>`<div class="row"><div><b>${o.planName}</b><p>TXID: ${o.txid||'-'} • ${money(o.finalPrice||o.amount)}</p></div><span class="tag ${o.status}">${o.status}</span></div>`).join(''):'<p class="muted">No orders yet.</p>'}`}
function plansHtml(){return`<h1>Choose Plan</h1><div class="grid">${plans.map(p=>`<div class="card plan"><h2>${p.name}</h2><h1>${money(p.price)}</h1><p>${p.durationDays||30} days access</p><ul>${(p.features||[]).map(f=>`<li>${f}</li>`).join('')}</ul><button class="primary" onclick="buyPlan('${p.id}')">Buy ${p.name}</button></div>`).join('')}</div>`}
function methodsHtml(){let tabs=['All','Free','Standard','Plus','Pro'];return`<h1>Methods</h1><p class="muted">Browse all method folders. Free methods open for everyone. Premium methods open after your plan is approved.</p><div class="methodFolders">${tabs.map(t=>`<button class="folderBtn" onclick="filterMethods('${t}')"><span>${t==='All'?'📚':t==='Free'?'🆓':t==='Standard'?'⭐':t==='Plus'?'💎':'👑'}</span><b>${t} Methods</b></button>`).join('')}</div><div id="methodList" class="methodOldList"></div>`}
function assetsOf(m){return [['Video',m.videoUrl],['Document',m.documentUrl],['Drive',m.driveUrl||m.link],['VIP Post',m.vipPostUrl],['Free Post',m.freePostUrl]].filter(x=>x[1]).map(x=>x[0])}
function methodCard(m){let thumb=m.thumbnail||m.image||m.imageUrl||'',lv=m.levels||['Free'],assets=assetsOf(m);return`<div class="oldMethod"><div class="oldThumb">${thumb?`<img src="${thumb}" onerror="this.parentElement.innerHTML='📚'">`:'📚'}</div><div class="oldMethodBody"><div class="oldTop"><h2>${m.title||'Untitled Method'}</h2>${m.expired?'<span class="tag rejected">Expired</span>':''}</div><p>${m.description||'Step-by-step method with video, document, Google Drive or group post links.'}</p><div class="badgeLine">${lv.map(x=>`<span>${x}</span>`).join('')}${assets.map(x=>`<span>${x}</span>`).join('')}</div><button class="primary openBtn" onclick="openMethod('${m.id}')">Open Method</button></div></div>`}
window.filterMethods=t=>{let list=methods.filter(m=>t==='All'||(m.levels||[]).includes(t));$('#methodList').innerHTML=list.map(methodCard).join('')||'<div class="card"><h2>No methods here yet</h2><p class="muted">Admin can upload video, document, Google Drive, VIP post, free group post, or extra links.</p></div>'};
function refHtml(a,b,c){return`<h1>Referral Center</h1><div class="grid"><div class="card"><small>Last 30 Days</small><h2>${money(a)}</h2></div><div class="card"><small>1 Year</small><h2>${money(b)}</h2></div><div class="card"><small>Total</small><h2>${money(c)}</h2></div></div><div class="card"><h2>Your Referral Code</h2><input value="${code()}" readonly><button onclick="navigator.clipboard.writeText('${refUrl()}');toast('Referral link copied')">Copy Referral Link</button><p class="muted">Share your referral link with serious members. When your referred user buys a plan and admin approves payment, your reward is added to your referral balance.</p></div>`}
function withdrawHtml(total){let pending=withdrawals.filter(w=>w.status==='pending').reduce((a,b)=>a+Number(b.amount||0),0);return`<h1>Withdraw Referral Earnings</h1><div class="grid"><div class="card"><small>Available Earnings</small><h2>${money(total-pending)}</h2></div><div class="card"><small>Pending Withdraw</small><h2>${money(pending)}</h2></div></div><div class="card"><h2>Request Withdraw</h2><input id="wamount" type="number" placeholder="Amount"><select id="wmethod"><option>USDT TRC20</option><option>Binance Pay</option><option>JazzCash</option><option>EasyPaisa</option><option>Bank Transfer</option></select><textarea id="waccount" placeholder="Your payment account / wallet / Binance Pay ID"></textarea><button class="primary" onclick="requestWithdraw()">Submit Withdraw Request</button></div><h2>Withdraw History</h2>${withdrawals.map(w=>`<div class="row"><div><b>${money(w.amount)}</b><p>${w.method} • ${w.account||''}</p></div><span class="tag ${w.status}">${w.status}</span></div>`).join('')||'<p class="muted">No withdraw requests.</p>'}`}
function communityHtml(paid){return`<h1>Community</h1><div class="grid">${community.map(c=>`<a class="community card" href="${c.url}" target="_blank"><b>${c.name}</b><p>${c.description||''}</p></a>`).join('')||'<div class="card">Community links will appear here.</div>'}${paid&&settings.vipChannelLink?`<a class="community card vip" href="${settings.vipChannelLink}" target="_blank"><b>VIP Channel</b><p>Private Telegram channel for active plan members.</p></a>`:''}</div>`}
window.requestWithdraw=async()=>{let amount=Number($('#wamount').value||0);if(!amount)return toast('Enter amount');await addDoc(collection(db,'withdrawals'),{userId:me.uid,userEmail:me.email,userName:profile.name||'',amount,method:$('#wmethod').value,account:$('#waccount').value,status:'pending',createdAt:serverTimestamp()});toast('Withdraw request sent to admin')};
window.buyPlan=id=>{let p=plans.find(x=>x.id==id);openModal(`<h2>Pay for ${p.name}</h2><p>Amount: <b>${money(p.price)}</b></p><p>Admin Payment ID: <b>${settings.paymentId||'Set by admin'}</b></p><input id="coupon" placeholder="Coupon code optional"><input id="txid" placeholder="Transaction ID"><textarea id="info" placeholder="Your payment note / username / screenshot link optional"></textarea><button class="primary" onclick="submitOrder('${id}')">Submit Payment Request</button>`)};
window.submitOrder=async id=>{let p=plans.find(x=>x.id==id),cp=$('#coupon').value.trim().toUpperCase(),discount=0;if(cp){let c=coupons.find(x=>x.code===cp&&x.active!==false);if(c)discount=c.type==='percent'?p.price*Number(c.value||0)/100:Number(c.value||0);else return toast('Invalid coupon')}await addDoc(collection(db,'orders'),{userId:me.uid,userEmail:me.email,userName:profile.name||'',planName:p.name,amount:p.price,discount,finalPrice:Math.max(0,p.price-discount),coupon:cp,txid:$('#txid').value,info:$('#info').value,status:'pending',createdAt:serverTimestamp(),referralCode:profile.usedReferral||''});closeModal();toast('Order sent to admin')};
window.openMethod=id=>{let m=methods.find(x=>x.id===id);if(!m)return;if(m.expired)return toast('This method is expired');let ok=(m.levels||['Free']).some(l=>l==='Free'||rank[profile.plan||'Basic']>=rank[l]);if(!ok){show('plans');return toast('Buy a plan to open this method')}let links=[['Video',m.videoUrl],['Document',m.documentUrl],['Google Drive',m.driveUrl||m.link],['VIP Group Post',m.vipPostUrl],['Free Group Post',m.freePostUrl]].filter(x=>x[1]);let extra=(m.extraLinks||'').split('\n').map(x=>x.trim()).filter(Boolean);openModal(`<h2>${m.title}</h2><p>${m.content||m.description||''}</p><div class="linkgrid">${links.map(x=>`<a class="btn" target="_blank" href="${x[1]}">${x[0]}</a>`).join('')}${extra.map((u,i)=>`<a class="btn" target="_blank" href="${u}">Extra Link ${i+1}</a>`).join('')}</div>`)};
window.openAuth=mode=>openModal(`<h2>${mode==='login'?'Login':'Create Account'}</h2>${mode==='signup'?'<input id="name" placeholder="Full Name">':''}<input id="email" placeholder="Gmail / Email"><input id="pass" type="password" placeholder="Password">${mode==='signup'?'<input id="pass2" type="password" placeholder="Confirm Password"><input id="ref" placeholder="Referral Code Optional" value="'+(new URLSearchParams(location.search).get('ref')||'')+'">':''}<button class="primary" onclick="authGo('${mode}')">${mode==='login'?'Login':'Create Account'}</button>`);
window.authGo=async mode=>{try{let email=$('#email').value,pass=$('#pass').value;if(mode==='signup'){if(pass!==$('#pass2').value)return toast('Passwords not match');let cr=await createUserWithEmailAndPassword(auth,email,pass);await setDoc(doc(db,'users',cr.user.uid),{name:$('#name').value,email,plan:'Basic',referralCode:'REF'+cr.user.uid.slice(0,8).toUpperCase(),usedReferral:$('#ref').value.trim().toUpperCase(),createdAt:serverTimestamp()})}else await signInWithEmailAndPassword(auth,email,pass);closeModal()}catch(e){toast(e.message)}};
function openModal(h){$('#modalBody').innerHTML=h;$('#modal').classList.add('show')}window.closeModal=()=>$('#modal').classList.remove('show');function drawChart(a,b,c){setTimeout(()=>{let el=$('#chart');if(!el)return;let x=el.getContext('2d'),w=el.width=el.offsetWidth,h=150,vals=[a,b,c],max=Math.max(...vals,1);x.clearRect(0,0,w,h);vals.forEach((v,i)=>{let bw=Math.min(90,w/6),gap=w/4,bh=v/max*(h-45),left=45+i*gap;x.fillStyle=['#55e6ac','#58b7ff','#8b5cf6'][i];x.beginPath();x.roundRect(left,h-bh-25,bw,bh,14);x.fill();x.fillStyle='#dbeafe';x.font='14px Arial';x.fillText(['30D','1Y','Total'][i],left+8,h-5);x.fillText(money(v),left,h-bh-34)})},80)}
onAuthStateChanged(auth,u=>{me=u;if(!u){onSnapshot(collection(db,'methods'),s=>{methods=s.docs.map(d=>({id:d.id,...d.data()}));redraw()});onSnapshot(doc(db,'settings','main'),s=>{settings={...settings,...(s.data()||{})};redraw()});return}onSnapshot(doc(db,'users',u.uid),s=>{profile=s.data()||{};redraw()});onSnapshot(collection(db,'plans'),s=>{plans=s.docs.map(d=>({id:d.id,...d.data()}));if(!plans.length)plans=[{id:'standard',name:'Standard',price:15,durationDays:30,features:['Standard methods','Referral reward']},{id:'plus',name:'Plus',price:30,durationDays:90,features:['Plus methods','VIP access']},{id:'pro',name:'Pro',price:60,durationDays:180,features:['All methods','Private channel']}];redraw()});onSnapshot(collection(db,'methods'),s=>{methods=s.docs.map(d=>({id:d.id,...d.data()}));redraw()});onSnapshot(query(collection(db,'orders'),where('userId','==',u.uid)),s=>{orders=s.docs.map(d=>({id:d.id,...d.data()}));redraw()});onSnapshot(query(collection(db,'referralEarnings'),where('userId','==',u.uid)),s=>{earnings=s.docs.map(d=>d.data());redraw()});onSnapshot(query(collection(db,'withdrawals'),where('userId','==',u.uid)),s=>{withdrawals=s.docs.map(d=>({id:d.id,...d.data()}));redraw()});onSnapshot(collection(db,'coupons'),s=>coupons=s.docs.map(d=>({id:d.id,...d.data()})));onSnapshot(collection(db,'communityLinks'),s=>{community=s.docs.map(d=>({id:d.id,...d.data()}));redraw()});onSnapshot(doc(db,'settings','main'),s=>{settings={...settings,...(s.data()||{})};redraw()})});
