<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GlobexoMart</title>

import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js';import{getAuth,createUserWithEmailAndPassword,signInWithEmailAndPassword,onAuthStateChanged,signOut}from'https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js';import{getFirestore,doc,setDoc,addDoc,collection,onSnapshot,serverTimestamp,updateDoc,increment,arrayUnion}from'https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js';
const firebaseConfig={apiKey:"AIzaSyC7SjMgzuH7stBaTP-jqkHfXDLmnNJV0X8",authDomain:"globexo-d9ade.firebaseapp.com",databaseURL:"https://globexo-d9ade-default-rtdb.firebaseio.com",projectId:"globexo-d9ade",storageBucket:"globexo-d9ade.firebasestorage.app",messagingSenderId:"1009453417317",appId:"1:1009453417317:web:32538a719df79d3c6ed78c",measurementId:"G-X0QPY3ML6M"};
const app=initializeApp(firebaseConfig),auth=getAuth(app),db=getFirestore(app);let me=null,profile={},plans=[],methods=[],orders=[],earnings=[],withdrawals=[],community=[],payments=[],settings={referralPoints:20,pointPrice:0.02,supportUrl:'',vipChannelLink:''};const rank={Free:0,Basic:0,Standard:1,Plus:2,Pro:3};const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)];function toast(t){$('#toast').textContent=t;$('#toast').classList.add('show');setTimeout(()=>$('#toast').classList.remove('show'),2500)}function money(n){return '$'+Number(n||0).toFixed(2)}function pts(n){return Number(n||0).toLocaleString()+' pts'}function code(){return profile.referralCode||('REF'+(me?.uid||'').slice(0,8).toUpperCase())}function refUrl(){return location.origin+location.pathname+'?ref='+code()}function qref(){return new URLSearchParams(location.search).get('ref')||''}function show(id){$$('.page').forEach(p=>p.classList.remove('active'));$('#'+id)?.classList.add('active');$$('.nav button').forEach(b=>b.classList.toggle('on',b.dataset.page==id));if(id==='methods')setTimeout(()=>filterMethods('All'),10);document.querySelector('.side')?.classList.remove('open')}
function landing(){let preview=methods.slice(0,6).map(methodCard).join('')||'<div class="card"><h2>Methods coming soon</h2><p class="muted">Admin will upload guides, videos, Drive links, documents, and post links here.</p></div>';return`<header class="top"><div class="brand"><img class="logoIcon" src="globexomart-learn-earn-icon.svg"><b>GlobexoMart</b></div></header><section class="hero"><span>Premium Methods • Real Earnings</span><h1>Unlock Premium Methods<br><b class="grad">& Grow Your Earnings</b></h1><p class="muted">Access high quality earning methods, step-by-step guides, referral rewards, and private plan community access.</p><div class="heroBtns"><button class="primary" onclick="openAuth('signup')">Create Account</button><button onclick="openAuth('login')">Login to Account</button></div></section><main class="main"><div class="grid"><div class="card stat"><h2>$18K+</h2><p class="muted">Total member earnings</p></div><div class="card stat"><h2>$4.7K</h2><p class="muted">30 day earnings</p></div><div class="card stat"><h2>92%</h2><p class="muted">Method satisfaction</p></div></div><div class="chart" style="margin:24px 0"><div class="bar" style="height:30%"></div><div class="bar" style="height:46%"></div><div class="bar" style="height:38%"></div><div class="bar" style="height:65%"></div><div class="bar" style="height:78%"></div><div class="bar" style="height:70%"></div><div class="bar" style="height:92%"></div></div><h1>Latest Methods</h1><div class="methodGrid">${preview}</div></main>`}
function redraw(){if(!me){$('#app').innerHTML=landing();return}let total=earnings.reduce((a,b)=>a+Number(b.amount||0),0),pending=orders.filter(o=>o.status==='pending').length;$('#app').innerHTML=`<aside class="side"><div class="brand"><img class="logoIcon" src="globexomart-learn-earn-icon.svg"><b>GlobexoMart</b></div><nav class="nav"><button class="on" data-page="dash">Dashboard</button><button data-page="plans">Plans</button><button data-page="methods">Methods</button><button data-page="points">Points</button><button data-page="ref">Referral</button><button data-page="withdraw">Withdraw</button><button data-page="community">Community</button><button onclick="supportOpen()">Support</button><button class="danger" onclick="signOut(auth)">Logout</button></nav></aside><header class="mobilebar"><button onclick="document.querySelector('.side').classList.toggle('open')">☰</button><div class="brand"><img class="logoIcon" src="globexomart-learn-earn-icon.svg"><b>GlobexoMart</b></div></header><main class="main"><section id="dash" class="page active">${dash(total,pending)}</section><section id="plans" class="page">${plansHtml()}</section><section id="methods" class="page">${methodsHtml()}</section><section id="points" class="page">${pointsHtml()}</section><section id="ref" class="page">${refHtml(total)}</section><section id="withdraw" class="page">${withdrawHtml(total)}</section><section id="community" class="page">${communityHtml()}</section></main>`;$$('.nav button[data-page]').forEach(b=>b.onclick=()=>show(b.dataset.page));drawChart(total);}
function dash(total,pending){return`<h1>Dashboard</h1><p class="muted">Welcome ${profile.name||''}. Track plan access, referral points, earnings, orders, and withdrawals.</p><div class="grid"><div class="card stat"><small>Current Plan</small><h2>${profile.plan||'Basic'}</h2><p class="muted">${profile.planExpiry?'Expires: '+new Date(profile.planExpiry).toLocaleDateString():'Free access'}</p></div><div class="card stat"><small>Your Points</small><h2>${pts(profile.points)}</h2><p class="muted">Use points to unlock selected methods.</p></div><div class="card stat"><small>Total Earnings</small><h2>${money(total)}</h2></div><div class="card stat"><small>Pending Orders</small><h2>${pending}</h2></div></div><h2 style="margin-top:28px">Referral Growth</h2><canvas id="chart" class="chart"></canvas><h2>Pending Orders</h2><div class="grid">${orders.filter(o=>o.status==='pending').map(o=>`<div class="card"><b>${o.type||'plan'}: ${o.planName||o.points+' points'||''}</b><p>TX: ${o.txid||''}</p><p>Status: pending</p></div>`).join('')||'<p class="muted">No orders yet.</p>'}</div>`}
function plansHtml(){return`<h1>Choose Plan</h1><div class="grid">${plans.map(p=>`<div class="card"><h2>${p.name}</h2><h1>${money(p.price)}</h1><p class="muted">${p.durationDays||30} days access</p><button class="primary" onclick="buyPlan('${p.id}')">Buy Plan</button></div>`).join('')||'<div class="card">Admin can add plans.</div>'}</div>`}
function pointsHtml(){return`<h1>Buy Points</h1><p class="muted">You can earn points from referrals or buy points directly. Price per point: ${money(settings.pointPrice||0.02)}</p><div class="card form"><input id="pointsAmount" type="number" placeholder="How many points? e.g. 500"><button class="primary" onclick="buyPoints()">Continue Payment</button></div>`}
function assetsOf(m){return [['Video',m.videoUrl],['Document',m.documentUrl],['Google Drive',m.driveUrl||m.link],['VIP Post',m.vipPostUrl],['Free Post',m.freePostUrl],['Extra Link',m.extraUrl]].filter(x=>x[1])}
function methodCard(m){let th=m.thumbnail||m.image||m.imageUrl||'',levels=m.levels||['Free'],bought=(profile.purchasedMethods||[]).includes(m.id);return`<div class="card method"><div class="thumb">${th?`<img src="${th}" onerror="this.parentElement.innerHTML='📚'">`:'📚'}</div><div class="methodBody"><h2>${m.title||'Untitled Method'}</h2><p class="muted">${m.description||'Video, documents, Drive links, and post links can be added by admin.'}</p><div>${levels.map(l=>`<span class="tag ${l==='Free'?'free':''}">${l}</span>`).join('')}${m.expired?'<span class="tag expired">Expired</span>':''}${m.allowPoints?`<span class="tag points">${pts(m.pointsPrice)} </span>`:''}${bought?'<span class="tag free">Owned</span>':''}</div><button class="primary" onclick="openMethod('${m.id}')">Open Method</button>${m.allowPoints?`<button onclick="buyMethodPoints('${m.id}')">Buy with Points</button>`:''}</div></div>`}
function methodsHtml(){let tabs=['All','Free','Standard','Plus','Pro'];return`<h1>Methods</h1><p class="muted">Free methods open for everyone. Locked methods can be opened by plan access or by points when admin allows it.</p><div class="methodTabs">${tabs.map(t=>`<button onclick="filterMethods('${t}')">${t}</button>`).join('')}</div><div id="methodList" class="methodGrid"></div>`}
window.filterMethods=t=>{let list=methods.filter(m=>t==='All'||(m.levels||[]).includes(t));$('#methodList').innerHTML=list.map(methodCard).join('')||'<div class="card">No methods here yet.</div>'}
function refHtml(total){return`<h1>Referral</h1><div class="grid"><div class="card"><small>Your referral code</small><h2>${code()}</h2><button onclick="navigator.clipboard.writeText('${refUrl()}');toast('Referral link copied')">Copy Link</button></div><div class="card"><small>Per referral reward</small><h2>${pts(settings.referralPoints||20)}</h2><p class="muted">Points are added when your referred user is approved by admin.</p></div><div class="card"><small>Referral Earnings</small><h2>${money(total)}</h2></div></div>`}
function withdrawHtml(total){let pending=withdrawals.filter(w=>w.status==='pending').reduce((a,b)=>a+Number(b.amount||0),0);return`<h1>Withdraw</h1><div class="grid"><div class="card"><small>Available</small><h2>${money(total-pending)}</h2></div><div class="card"><small>Pending</small><h2>${money(pending)}</h2></div></div><div class="card form"><input id="wamount" type="number" placeholder="Amount"><input id="wmethod" placeholder="Payment method name"><textarea id="waccount" placeholder="Account / address where admin should pay"></textarea><button class="primary" onclick="requestWithdraw()">Request Withdraw</button></div>`}
function communityHtml(){let paid=rank[profile.plan||'Basic']>0;return`<h1>Community</h1><div class="grid">${community.map(c=>`<a class="card linkCard" href="${c.url}" target="_blank"><h2>${c.name}</h2><p class="muted">${c.description||''}</p></a>`).join('')||'<div class="card">Community links will appear here.</div>'}${paid&&settings.vipChannelLink?`<a class="card linkCard" href="${settings.vipChannelLink}" target="_blank"><h2>VIP Channel</h2><p class="muted">Private plan members channel.</p></a>`:''}</div>`}
function paymentOptions(){return payments.map(p=>`<option value="${p.id}">${p.name}</option>`).join('')}function selectedPayment(){let id=$('#payMethod')?.value,p=payments.find(x=>x.id===id)||{};$('#payInfo').innerHTML=p.address?`<div class="card"><b>${p.name}</b><p>${p.address}</p><button onclick="navigator.clipboard.writeText('${p.address}');toast('Copied')">Copy Address</button></div>`:''}
window.buyPlan=id=>{let p=plans.find(x=>x.id===id);openModal(`<h2>Pay for ${p.name}</h2><p>Amount: <b>${money(p.price)}</b></p><select id="payMethod" onchange="selectedPayment()">${paymentOptions()}</select><div id="payInfo"></div><input id="coupon" placeholder="Coupon code optional"><input id="txid" placeholder="Transaction ID"><textarea id="proof" placeholder="Proof / screenshot URL optional"></textarea><button class="primary" onclick="submitPlanOrder('${id}')">Submit Payment</button>`);selectedPayment()}
window.buyPoints=()=>{let points=Number($('#pointsAmount').value||0);if(!points)return toast('Enter points');let amount=points*Number(settings.pointPrice||0.02);openModal(`<h2>Buy ${pts(points)}</h2><p>Amount: <b>${money(amount)}</b></p><select id="payMethod" onchange="selectedPayment()">${paymentOptions()}</select><div id="payInfo"></div><input id="txid" placeholder="Transaction ID"><textarea id="proof" placeholder="Proof / screenshot URL optional"></textarea><button class="primary" onclick="submitPointsOrder(${points},${amount})">Submit Payment</button>`);selectedPayment()}
window.submitPlanOrder=async id=>{let p=plans.find(x=>x.id===id),pm=payments.find(x=>x.id==$('#payMethod').value)||{};await addDoc(collection(db,'orders'),{type:'plan',userId:me.uid,userEmail:me.email,userName:profile.name||'',planId:id,planName:p.name,amount:p.price,status:'pending',txid:$('#txid').value,proof:$('#proof').value,paymentMethod:pm.name,paymentAddress:pm.address,referralCode:profile.usedReferral||'',createdAt:serverTimestamp()});closeModal();toast('Payment submitted. Wait for admin approval.')}
window.submitPointsOrder=async(points,amount)=>{let pm=payments.find(x=>x.id==$('#payMethod').value)||{};await addDoc(collection(db,'orders'),{type:'points',userId:me.uid,userEmail:me.email,userName:profile.name||'',points,amount,status:'pending',txid:$('#txid').value,proof:$('#proof').value,paymentMethod:pm.name,paymentAddress:pm.address,createdAt:serverTimestamp()});closeModal();toast('Points order submitted.')}
window.openMethod=id=>{let m=methods.find(x=>x.id===id);if(!m)return;if(m.expired)return toast('This method is expired');let owned=(profile.purchasedMethods||[]).includes(id),ok=owned||(m.levels||['Free']).some(l=>l==='Free'||rank[profile.plan||'Basic']>=rank[l]);if(!ok){show('plans');return toast('Upgrade plan or buy with points to open this method')}let links=assetsOf(m).map(a=>`<a class="btn" target="_blank" href="${a[1]}">${a[0]}</a>`).join('');openModal(`<h2>${m.title}</h2><p>${m.description||''}</p>${links||'<p>No files/links added yet.</p>'}`)}
window.buyMethodPoints=async id=>{let m=methods.find(x=>x.id===id);if(!m?.allowPoints)return;if(Number(profile.points||0)<Number(m.pointsPrice||0))return toast('Not enough points');await updateDoc(doc(db,'users',me.uid),{points:increment(-Number(m.pointsPrice||0)),purchasedMethods:arrayUnion(id)});toast('Method unlocked with points')}
window.requestWithdraw=async()=>{let amount=Number($('#wamount').value||0);if(!amount)return toast('Enter amount');await addDoc(collection(db,'withdrawals'),{userId:me.uid,userEmail:me.email,userName:profile.name||'',amount,method:$('#wmethod').value,account:$('#waccount').value,status:'pending',createdAt:serverTimestamp()});toast('Withdraw request sent')}
window.supportOpen=()=>{let u=settings.supportUrl||settings.supportUsername||'';if(!u)return toast('Support link not set');if(u.startsWith('@'))u='https://t.me/'+u.slice(1);window.open(u,'_blank')}
window.openAuth=mode=>openModal(`<h2>${mode==='login'?'Login':'Create Account'}</h2><div class="form">${mode==='signup'?'<input id="name" placeholder="Full Name">':''}<input id="email" placeholder="Gmail / Email"><input id="pass" type="password" placeholder="Password">${mode==='signup'?`<input id="pass2" type="password" placeholder="Confirm Password"><input id="ref" placeholder="Referral code optional" value="${qref()}">`:''}<button class="primary" onclick="authGo('${mode}')">Continue</button></div>`)
window.authGo=async mode=>{try{let email=$('#email').value.trim(),pass=$('#pass').value;if(mode==='signup'){if(pass!==$('#pass2').value)return toast('Passwords not match');let cr=await createUserWithEmailAndPassword(auth,email,pass);let referralCode='REF'+cr.user.uid.slice(0,8).toUpperCase();await setDoc(doc(db,'users',cr.user.uid),{name:$('#name').value,email,plan:'Basic',points:0,referralCode,usedReferral:$('#ref').value.trim().toUpperCase(),createdAt:serverTimestamp()})}else await signInWithEmailAndPassword(auth,email,pass);closeModal()}catch(e){toast(e.message)}}
function openModal(h){$('#modalBody').innerHTML=h;$('#modal').classList.add('show')}window.closeModal=()=>$('#modal').classList.remove('show');function drawChart(t){setTimeout(()=>{let c=$('#chart');if(!c)return;let x=c.getContext('2d'),w=c.width=c.offsetWidth,h=c.height=180;x.clearRect(0,0,w,h);let vals=[12,24,18,40,35,55,Math.max(70,Number(t||0)+60)],mx=Math.max(...vals);x.lineWidth=6;x.strokeStyle='#55e6ac';x.beginPath();vals.forEach((v,i)=>{let px=i*(w/(vals.length-1)),py=h-20-v/mx*(h-45);i?x.lineTo(px,py):x.moveTo(px,py)});x.stroke();},80)}
onAuthStateChanged(auth,u=>{me=u;if(!u){onSnapshot(collection(db,'methods'),s=>{methods=s.docs.map(d=>({id:d.id,...d.data()}));redraw()});onSnapshot(doc(db,'settings','main'),s=>{settings={...settings,...(s.data()||{})};redraw()});return}onSnapshot(doc(db,'users',u.uid),s=>{profile=s.data()||{};redraw()});onSnapshot(collection(db,'plans'),s=>{plans=s.docs.map(d=>({id:d.id,...d.data()}));redraw()});onSnapshot(collection(db,'methods'),s=>{methods=s.docs.map(d=>({id:d.id,...d.data()}));redraw()});onSnapshot(collection(db,'orders'),s=>{orders=s.docs.map(d=>({id:d.id,...d.data()})).filter(o=>o.userId===u.uid);redraw()});onSnapshot(collection(db,'earnings'),s=>{earnings=s.docs.map(d=>({id:d.id,...d.data()})).filter(e=>e.userId===u.uid);redraw()});onSnapshot(collection(db,'withdrawals'),s=>{withdrawals=s.docs.map(d=>({id:d.id,...d.data()})).filter(w=>w.userId===u.uid);redraw()});onSnapshot(collection(db,'community'),s=>{community=s.docs.map(d=>({id:d.id,...d.data()}));redraw()});onSnapshot(collection(db,'paymentMethods'),s=>{payments=s.docs.map(d=>({id:d.id,...d.data()}));redraw()});onSnapshot(doc(db,'settings','main'),s=>{settings={...settings,...(s.data()||{})};redraw()})});
</script><style>*{box-sizing:border-box}body{margin:0;background:#06111e;color:#f8fbff;font-family:Inter,system-ui,Arial;overflow-x:hidden}button,.btn{border:0;border-radius:18px;padding:14px 20px;background:#142740;color:#fff;font-weight:900;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:8px;cursor:pointer}button:hover,.btn:hover{filter:brightness(1.1)}.primary{background:linear-gradient(135deg,#55e6ac,#55b8ff);color:#07111f}.danger{background:#2a0718;border:1px solid #ff5f8d;color:#ff7e9e}.top{position:sticky;top:0;z-index:20;background:#081424e8;backdrop-filter:blur(12px);border-bottom:1px solid #244063;padding:18px 6%;display:flex;align-items:center;justify-content:space-between}.brand{display:flex;align-items:center;gap:14px;font-size:28px;font-weight:950;white-space:nowrap}.logoIcon{width:64px;height:64px;object-fit:contain}.hero{padding:70px 6%;text-align:center;background:radial-gradient(circle at 50% 0,#164d7b88,transparent 45%)}.hero span{display:inline-block;background:#0d493f;border-radius:40px;padding:12px 24px;color:#62f0b0;font-weight:900}.hero h1{font-size:clamp(42px,8vw,78px);line-height:1.06;margin:28px 0 18px}.grad{background:linear-gradient(135deg,#5bf0af,#58baff);-webkit-background-clip:text;color:transparent}.muted{color:#a9b9cd;font-size:clamp(18px,3.7vw,24px);line-height:1.5}.heroBtns{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-top:28px}.layout{display:grid;grid-template-columns:290px 1fr;min-height:100vh}.side{position:sticky;top:0;height:100vh;padding:22px;background:#081424;border-right:1px solid #223a5d;display:flex;flex-direction:column;gap:18px}.nav{display:grid;gap:11px}.nav button{justify-content:flex-start}.nav button.on{background:linear-gradient(135deg,#55e6ac,#55b8ff);color:#06111e}.main{padding:42px;max-width:1180px;width:100%;margin:auto}.mobilebar{display:none}.page{display:none}.page.active{display:block}h1{font-size:clamp(36px,7vw,62px);margin:0 0 20px}h2{font-size:32px;margin:10px 0}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:22px}.card{background:linear-gradient(160deg,#102642,#071829);border:1px solid #29466c;border-radius:28px;padding:28px;box-shadow:0 20px 60px #0005}.stat{min-height:160px}.stat h2{font-size:48px}.chart{height:180px;background:linear-gradient(180deg,#0d2848,#071829);border:1px solid #29466c;border-radius:28px;padding:18px;display:flex;align-items:end;gap:10px}.bar{flex:1;border-radius:12px 12px 0 0;background:linear-gradient(180deg,#55e6ac,#55b8ff)}.methodTabs{display:flex;gap:10px;overflow:auto;padding-bottom:8px;margin:16px 0}.methodTabs button{min-width:max-content}.methodGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px}.method{overflow:hidden;padding:0}.thumb{height:160px;background:#102642;display:flex;align-items:center;justify-content:center;font-size:50px}.thumb img{width:100%;height:100%;object-fit:cover}.methodBody{padding:22px}.tag{display:inline-flex;margin:4px 5px 4px 0;padding:7px 11px;border-radius:99px;background:#17365a;color:#bde0ff;font-size:13px;font-weight:800}.free{background:#0d493f;color:#62f0b0}.expired{background:#492031;color:#ff8fab}.points{background:#4a3c0d;color:#ffd66b}.modal{display:none;position:fixed;inset:0;background:#000b;z-index:99;align-items:center;justify-content:center;padding:18px}.modal.show{display:flex}.box{max-width:560px;width:100%;max-height:90vh;overflow:auto;background:#0b192b;border:1px solid #29466c;border-radius:28px;padding:24px}.x{float:right}.form{display:grid;gap:12px}.form input,.form textarea,.form select,input,textarea,select{width:100%;padding:15px;border-radius:16px;border:1px solid #29466c;background:#06111e;color:#fff;margin:6px 0}.linkCard{text-decoration:none;color:#fff}#toast{position:fixed;left:50%;bottom:25px;transform:translateX(-50%);background:#111b2a;padding:14px 20px;border-radius:16px;display:none;z-index:120}#toast.show{display:block}@media(max-width:800px){.layout{display:block}.side{position:fixed;left:-310px;top:0;z-index:50;width:300px;transition:.25s}.side.open{left:0}.mobilebar{display:flex;position:sticky;top:0;z-index:30;align-items:center;gap:12px;padding:16px;background:#081424;border-bottom:1px solid #223a5d}.main{padding:34px 18px}.top{padding:16px 18px}.brand{font-size:24px}.logoIcon{width:56px;height:56px}.hero{padding:54px 18px}.heroBtns{display:grid}.grid{grid-template-columns:1fr}.methodGrid{grid-template-columns:1fr}</style></head><body><div id="app"></div><div id="modal" class="modal"><div class="box"><button class="x" onclick="closeModal()">×</button><div id="modalBody"></div></div></div><div id="toast"></div></body></html>
